services:
  postgres:
    image: postgres:16-alpine
    container_name: 3w_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-threew}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-threew}
      POSTGRES_SHARED_BUFFERS: ${POSTGRES_SHARED_BUFFERS:-512MB}
    ports:
      - "5433:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-threew} -d ${POSTGRES_DB:-threew}"]
      interval: 5s
      timeout: 5s
      retries: 10

  geoserver:
    image: kartoza/geoserver:2.24.0
    container_name: 3w_geoserver
    restart: always
    ports:
      - "8600:8080"
    volumes:
      - ./volumes/geoserver:/opt/geoserver/data_dir
    mem_limit: 1g

  backend:
    build: ../backend
    container_name: 3w_backend
    restart: always
    env_file: ../backend/.env
    environment:
      POSTGRES_DSN: postgresql+psycopg://${POSTGRES_USER:-threew}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-threew}
      GEOSERVER_URL: http://geoserver:8080/geoserver
      CORS_ORIGINS: '["http://localhost","http://${EC2_HOST:-localhost}"]'
      DUCKDB_PATH: /app/data/analytics.duckdb
      PARQUET_DIR: /app/data/parquet
      RAW_DATA_DIR: /app/data/raw
      AVATAR_DIR: /app/data/avatars
    volumes:
      - ../backend/data:/app/data
    mem_limit: 3g
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: 3w_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
